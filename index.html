<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Приглашение</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
color:white;
text-align:center;
}

.envelope{
background:white;
width:320px;
height:200px;
position:relative;
cursor:pointer;
border-radius:10px;
}

.envelope:before{
content:"";
position:absolute;
border-left:160px solid transparent;
border-right:160px solid transparent;
border-top:100px solid #ff758c;
top:0;
}

.card{
display:none;
background:rgba(0,0,0,0.6);
padding:30px;
border-radius:20px;
width:90%;
max-width:500px;
}

.timer{
font-size:26px;
margin:20px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
margin:10px;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>

</head>

<body>

<div class="envelope" onclick="openInvite()"></div>

<div class="card" id="invite">

<h1>Ты приглашен</h1>

<p>День рождения Али</p>

<p>20 апреля • 18:00</p>

<div class="timer" id="timer"></div>

<button onclick="playMusic()">Музыка</button>

<button onclick="confetti()">Я приду</button>

<audio id="music">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9c7c8c0a8c.mp3">
</audio>

<iframe
src="https://maps.google.com/maps?q=Almaty&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%"
height="200"
style="border-radius:10px">
</iframe>

</div>

<canvas id="canvas"></canvas>

<script>

function openInvite(){
document.querySelector(".envelope").style.display="none"
document.getElementById("invite").style.display="block"
}

function playMusic(){
document.getElementById("music").play()
}

let eventDate = new Date("Apr 20, 2026 18:00:00").getTime()

setInterval(function(){

let now = new Date().getTime()
let distance = eventDate - now

let days = Math.floor(distance/(1000*60*60*24))
let hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60))
let minutes = Math.floor((distance%(1000*60*60))/(1000*60))

document.getElementById("timer").innerHTML =
days+"д "+hours+"ч "+minutes+"м"

},1000)

function confetti(){

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let pieces=[]

for(let i=0;i<150;i++){
pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*8+2,
speed:Math.random()*3+1
})
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

pieces.forEach(p=>{
ctx.fillStyle="white"
ctx.fillRect(p.x,p.y,p.size,p.size)

p.y+=p.speed

if(p.y>canvas.height)p.y=0
})

requestAnimationFrame(draw)

}

draw()

}

</script>

</body>
</html>
