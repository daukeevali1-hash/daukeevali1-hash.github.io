<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Приглашение</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
color:white;
overflow-x:hidden;
}

.hero{
height:100vh;
background:url("https://images.unsplash.com/photo-1492684223066-81342ee5ff30") center/cover;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero h1{
font-family:'Great Vibes',cursive;
font-size:80px;
margin-bottom:20px;
}

.hero p{
font-size:26px;
}

.timer{
font-size:32px;
margin-top:30px;
}

section{
padding:100px 20px;
text-align:center;
}

.program{
background:#111;
}

.program h2{
font-family:'Great Vibes',cursive;
font-size:50px;
margin-bottom:30px;
}

.program p{
font-size:22px;
margin:10px;
}

.gallery{
background:#fafafa;
color:black;
}

.gallery h2{
font-family:'Great Vibes',cursive;
font-size:50px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
width:85%;
margin:auto;
}

.grid img{
width:100%;
border-radius:15px;
transition:0.4s;
}

.grid img:hover{
transform:scale(1.05);
}

.map{
background:#111;
}

.map h2{
font-family:'Great Vibes',cursive;
font-size:50px;
}

iframe{
margin-top:30px;
border-radius:15px;
}

</style>

</head>

<body>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9c7c8c0a8c.mp3" type="audio/mpeg">
</audio>

<section class="hero">

<h1>Ты приглашен</h1>

<p>День рождения Али</p>

<p>20 апреля • 18:00</p>

<div class="timer" id="timer"></div>

</section>


<section class="program">

<h2>Программа вечера</h2>

<p>18:00 встреча гостей</p>
<p>19:00 ужин</p>
<p>20:00 музыка и танцы</p>

</section>


<section class="gallery">

<h2>Фото</h2>

<div class="grid">

<img src="https://images.unsplash.com/photo-1505238680356-667803448bb6">
<img src="https://images.unsplash.com/photo-1464366400600-7168b8af9bc3">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552">
<img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622">

</div>

</section>


<section class="map">

<h2>Место встречи</h2>

<iframe
src="https://maps.google.com/maps?q=Almaty&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="600"
height="300">
</iframe>

</section>


<script>

let eventDate=new Date("Apr 20, 2026 18:00:00").getTime()

setInterval(function(){

let now=new Date().getTime()
let distance=eventDate-now

let days=Math.floor(distance/(1000*60*60*24))
let hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60))
let minutes=Math.floor((distance%(1000*60*60))/(1000*60))

document.getElementById("timer").innerHTML=
days+" дней "+hours+" часов "+minutes+" минут"

},1000)

</script>

</body>
</html>
